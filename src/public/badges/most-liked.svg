<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Most Liked badge">
  <!-- Medallion ground -->
  <circle cx="60" cy="60" r="58" fill="#ffffff"/>
  <!-- Bold green hoop -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="#467058" stroke-width="5"/>
  <!-- Thin inner ring -->
  <circle cx="60" cy="60" r="47" fill="none" stroke="#aebbb2" stroke-width="1.5"/>
  <!-- Pale mint interior well -->
  <circle cx="60" cy="60" r="45" fill="#f0f4f2"/>

  <g transform="translate(0 -4)">
    <!-- Outer heart: deep-green outline, white face -->
    <path d="M60 88
             C 52 80.5, 36.5 70, 36.5 55.5
             C 36.5 46, 43.8 39.8, 51.2 39.8
             C 55.4 39.8, 58.3 42, 60 45
             C 61.7 42, 64.6 39.8, 68.8 39.8
             C 76.2 39.8, 83.5 46, 83.5 55.5
             C 83.5 70, 68 80.5, 60 88 Z"
          fill="#ffffff" stroke="#2a4335" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- Inner heart: solid green -->
    <path d="M60 79
             C 54.5 73.5, 43.5 65.5, 43.5 55.5
             C 43.5 49.5, 48.2 45.8, 52.4 45.8
             C 55.6 45.8, 58.4 47.8, 60 51
             C 61.6 47.8, 64.4 45.8, 67.6 45.8
             C 71.8 45.8, 76.5 49.5, 76.5 55.5
             C 76.5 65.5, 65.5 73.5, 60 79 Z"
          fill="#467058"/>
  </g>
</svg>
