name: CI

on:
  push:
    branches-ignore: ['gh-readonly-queue/**']
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  # Server-side backstop for the local commit gates: each hook file must exist,
  # be LF-protected (autocrlf would corrupt the shebang), and start with a sh shebang.
  commit-gate-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Commit-gate integrity
        run: |
          test -f .githooks/pre-commit || { echo "commit gate missing: .githooks/pre-commit"; exit 1; }
          git check-attr text eol -- .githooks/pre-commit | grep -q 'eol: lf' \
            || { echo "commit gate not LF-protected (autocrlf could corrupt it)"; exit 1; }
          head -1 .githooks/pre-commit | grep -q '^#!/bin/sh' \
            || { echo "commit gate shebang corrupt"; exit 1; }
          test -f .githooks/commit-msg || { echo "commit-msg hook missing: .githooks/commit-msg"; exit 1; }
          git check-attr text eol -- .githooks/commit-msg | grep -q 'eol: lf' \
            || { echo "commit-msg hook not LF-protected (autocrlf could corrupt it)"; exit 1; }
          head -1 .githooks/commit-msg | grep -q '^#!/bin/sh' \
            || { echo "commit-msg hook shebang corrupt"; exit 1; }

  # Event-mode expiry backstop (#220): an expired governance/event-mode.json
  # enables nothing locally, but leaving it in the tree means the freeze window
  # ended without cleanup. This job goes red — on main and every branch/PR that
  # still carries the expired flag — until the flag is cleared via
  # tools/set-event-mode.ps1 -Clear, which itself refuses until every freeze
  # commit has its retro-review PASS. The cleanup PR (flag removed) is green.
  event-mode-expiry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Fail on an expired or invalid event-mode flag
        run: pwsh -File tools/check-event-mode-expiry.ps1

  # Advisory check: warn when a PR has no linked issue in its commits or title.
  # This is a soft backstop; the un-bypassable version is issue #48.
  merge-association:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check PR links an issue
        run: |
          # Collect commit messages on this PR branch (not on base).
          base="${{ github.event.pull_request.base.sha }}"
          msgs="$(git log "$base"..HEAD --format='%s %b')"
          pr_title="${{ github.event.pull_request.title }}"
          combined="$msgs $pr_title"
          # Accept (#N), Closes #N, Fixes #N, Resolves #N (case-insensitive).
          if echo "$combined" | grep -qiE '(\(#[0-9]+\)|closes\s+#[0-9]+|fixes\s+#[0-9]+|resolves\s+#[0-9]+)'; then
            echo "merge-association: issue link found."
          else
            echo "::warning::merge-association: no linked issue found in commit messages or PR title. Add (#N) or 'Closes #N' to a commit message or the PR title. The un-bypassable version is issue #48."
            exit 0
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier (check)
        run: npm run format:check

  # Empirical smoke gate (#197): boots the real app against a seeded throwaway
  # DB and probes behavior (hot paths, hostile input, referenced assets).
  # Deliberately a separate job from `test` so a smoke failure reads distinctly
  # from a unit failure. IS a required status check on main (promoted via
  # tools/apply-branch-protection.ps1 -RequireSmoke once #187/#193 closed).
  # See DESIGN.md "Empirical smoke gate (#197)" and "Merge queue (#404)".
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Smoke — boot, probe, verify assets
        run: node scripts/smoke.js

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Tests + coverage
        run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn
