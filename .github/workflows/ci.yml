name: CI

on:
  push:
    branches-ignore: ['gh-readonly-queue/**']
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier (check)
        run: npm run format:check

  # Empirical smoke gate (#197): boots the real app against a seeded throwaway
  # DB and probes behavior (hot paths, hostile input, referenced assets).
  # Deliberately a separate job from `test` so a smoke failure reads distinctly
  # from a unit failure. IS a required status check on main (promoted via
  # tools/apply-branch-protection.ps1 -RequireSmoke once #187/#193 closed).
  # See DESIGN.md "Empirical smoke gate (#197)" and "Merge queue (#404)".
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Smoke — boot, probe, verify assets
        run: node scripts/smoke.js

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Tests + coverage
        run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn

  # Hosted-deploy image build (issue #286, DESIGN.md § Hosted deployment).
  # Independent of the other jobs (no `needs:`) so it runs in parallel; Docker
  # is preinstalled on ubuntu-latest runners.
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t taskmasterwedding-ci-probe .
