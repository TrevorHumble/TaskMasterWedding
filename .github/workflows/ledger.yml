# Governance ledger harvest (#219).
#
# This job is the ONLY sanctioned writer of governance/ledger.ndjson.
# No local session or agent ever writes that file: a ledger row must never be
# part of the tree it describes (appending the row changes the tree and would
# invalidate the tree-bound review verdict), so rows are appended here, by CI,
# post-merge on main. See DESIGN.md "Governance ledger (#219)".
name: Governance ledger

on:
  push:
    branches: [main]
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: read

# One appender at a time: two overlapping harvests must not race the append+push.
concurrency:
  group: governance-ledger
  cancel-in-progress: false

jobs:
  harvest:
    # Skip the workflow's own ledger commits (head commit message starts with
    # "ledger: ") so an append cannot re-trigger an appending run forever.
    # For label events, only a design-reversed label on a merged PR harvests.
    if: >-
      (github.event_name == 'push' &&
       !startsWith(github.event.head_commit.message, 'ledger: ')) ||
      (github.event_name == 'pull_request' &&
       github.event.label.name == 'design-reversed' &&
       github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Harvest always appends to the ledger as it exists on main, even
          # when triggered by a label event on a PR ref.
          ref: main
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Harvest merged PRs into the ledger
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/ledger-harvest.js
      - name: Commit and push appended rows
        run: |
          if git diff --quiet -- governance/ledger.ndjson; then
            echo "ledger: no rows appended, nothing to commit."
            exit 0
          fi
          git config user.name "governance-ledger[bot]"
          git config user.email "governance-ledger@users.noreply.github.com"
          git add governance/ledger.ndjson
          git commit -m "ledger: append harvested rows"
          git push origin main
