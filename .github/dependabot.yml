version: 2
updates:
  # Keep CI's GitHub Actions patched and pinned.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      actions-all:
        patterns:
          - '*'

  # Keep npm dependencies patched (Express, multer, sharp, etc.).
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    groups:
      prod-deps:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
        exclude-patterns:
          - 'multer'
          - 'sharp'
          - 'ejs'
          - 'better-sqlite3'
          - 'bcryptjs'
          - 'archiver'
      dev-deps:
        dependency-type: 'development'
