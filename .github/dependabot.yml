version: 2
updates:
  # Keep CI's GitHub Actions patched and pinned.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'

  # Keep npm dependencies patched (Express, multer, sharp, etc.).
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
